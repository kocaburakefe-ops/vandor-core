name: Vandor Core Auto-Compiler

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repo'yu Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Derleyiciyi Calistir
        run: python src/builder.py

      - name: Degisiklikleri Otomatik Kaydet (Commit)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: dictionary.json ve DICTIONARY.md guncellendi'
          
