name: Vandor Core Auto-Compiler

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Derleyiciyi Çalıştır
        run: python src/builder.py

      - name: Değişiklikleri Otomatik Kaydet (Commit)
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'auto: dictionary.json ve DICTIONARY.md güncellendi'
          
