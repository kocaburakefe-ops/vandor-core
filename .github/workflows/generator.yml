name: Vandor'S Batch Generator

on:
  schedule:
    # Her 30 dakikada bir otomatik tetiklenir
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Generator
        run: python src/generator.py
      - name: Commit & Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/
          git commit -m "auto: generated new batch" || exit 0
          git push

